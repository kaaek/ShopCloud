x-backend-env: &backend-env
  POSTGRES_URL: ${POSTGRES_URL:-jdbc:postgresql://postgres:5432/shopcloud?currentSchema=shopcloud}
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
  SHOPCLOUD_JWT_SECRET: ${SHOPCLOUD_JWT_SECRET:-change-me-to-a-very-long-secret-key-32-chars-minimum}
  SHOPCLOUD_INTERNAL_TOKEN: ${SHOPCLOUD_INTERNAL_TOKEN:-change-me-internal-token}

services:
  postgres:
    image: postgres:16-alpine
    container_name: shopcloud-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-shopcloud}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-shopcloud}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: shopcloud-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@shopcloud.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: shopcloud-auth
    environment:
      <<: *backend-env
      SERVER_PORT: 8080
      SHOPCLOUD_JWT_EXPIRATION_MS: ${SHOPCLOUD_JWT_EXPIRATION_MS:-86400000}
      SHOPCLOUD_ADMIN_BOOTSTRAP_KEY: ${SHOPCLOUD_ADMIN_BOOTSTRAP_KEY:-change-me-admin-bootstrap-key}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  catalog-service:
    build:
      context: ./backend/catalog-service
      dockerfile: Dockerfile
    container_name: shopcloud-catalog
    environment:
      <<: *backend-env
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    restart: unless-stopped

  cart-service:
    build:
      context: ./backend/cart-service
      dockerfile: Dockerfile
    container_name: shopcloud-cart
    environment:
      <<: *backend-env
      SERVER_PORT: 8082
      CATALOG_SERVICE_URL: http://catalog-service:8081
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      catalog-service:
        condition: service_started
    restart: unless-stopped

  checkout-service:
    build:
      context: ./backend/checkout-service
      dockerfile: Dockerfile
    container_name: shopcloud-checkout
    environment:
      <<: *backend-env
      SERVER_PORT: 8083
      CART_SERVICE_URL: http://cart-service:8082
      CATALOG_SERVICE_URL: http://catalog-service:8081
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      cart-service:
        condition: service_started
      catalog-service:
        condition: service_started
    restart: unless-stopped

  admin-service:
    build:
      context: ./backend/admin-service
      dockerfile: Dockerfile
    container_name: shopcloud-admin
    environment:
      <<: *backend-env
      SERVER_PORT: 8084
      CATALOG_SERVICE_URL: http://catalog-service:8081
      CHECKOUT_SERVICE_URL: http://checkout-service:8083
    ports:
      - "8084:8084"
    depends_on:
      auth-service:
        condition: service_started
      checkout-service:
        condition: service_started
      catalog-service:
        condition: service_started
    restart: unless-stopped

  customer-frontend:
    build:
      context: ./frontend/customer-frontend
      dockerfile: Dockerfile
    container_name: shopcloud-customer-frontend
    ports:
      - "3000:80"
    volumes:
      - ./docker/nginx/customer-frontend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      auth-service:
        condition: service_started
      catalog-service:
        condition: service_started
      cart-service:
        condition: service_started
      checkout-service:
        condition: service_started
    restart: unless-stopped

  admin-frontend:
    build:
      context: ./frontend/admin-frontend
      dockerfile: Dockerfile
    container_name: shopcloud-admin-frontend
    ports:
      - "3001:80"
    volumes:
      - ./docker/nginx/admin-frontend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      auth-service:
        condition: service_started
      admin-service:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:

server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: admin-service

shopcloud:
  jwt:
    secret: ${SHOPCLOUD_JWT_SECRET:change-me-to-a-very-long-secret-key-32-chars-minimum}
  internal-token: ${SHOPCLOUD_INTERNAL_TOKEN:change-me-internal-token}
  services:
    catalog-url: ${CATALOG_SERVICE_URL:http://localhost:8081}
    checkout-url: ${CHECKOUT_SERVICE_URL:http://localhost:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info

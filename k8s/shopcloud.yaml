apiVersion: v1
kind: ConfigMap
metadata:
  name: shopcloud-runtime-config
  labels:
    app.kubernetes.io/part-of: shopcloud
data:
  AWS_REGION: "__AWS_REGION__"
  CATALOG_SERVICE_URL: "http://catalog-service:8081"
  CART_SERVICE_URL: "http://cart-service:8082"
  CHECKOUT_SERVICE_URL: "http://checkout-service:8083"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: shopcloud-nginx-configs
  labels:
    app.kubernetes.io/part-of: shopcloud
data:
  customer-frontend.conf: |
    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      location / {
        try_files $uri $uri/ /index.html;
      }

      location /api/auth {
        proxy_pass http://auth-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /api/products {
        proxy_pass http://catalog-service:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "";
      }

      location /api/cart {
        proxy_pass http://cart-service:8082;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /api/checkout {
        proxy_pass http://checkout-service:8083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /api/orders {
        proxy_pass http://checkout-service:8083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }
  admin-frontend.conf: |
    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      location / {
        try_files $uri $uri/ /index.html;
      }

      location /api/auth/ {
        proxy_pass http://auth-service:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /api/admin/ {
        proxy_pass http://admin-service:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-service-sa
  labels:
    app.kubernetes.io/part-of: shopcloud
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: catalog-service-sa
  labels:
    app.kubernetes.io/part-of: shopcloud
---
apiVersion: v1
kind: ServiceAccount
metadata:

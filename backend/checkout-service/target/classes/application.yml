server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: checkout-service

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/shopcloud?currentSchema=shopcloud}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  cloud:
    aws:
      region:
        static: ${AWS_REGION:us-east-1}

shopcloud:
  jwt:
    secret: ${SHOPCLOUD_JWT_SECRET:change-me-to-a-very-long-secret-key-32-chars-minimum}

  internal-token: ${SHOPCLOUD_INTERNAL_TOKEN:change-me-internal-token}

  services:
    cart-url: ${CART_SERVICE_URL:http://localhost:8082}
    catalog-url: ${CATALOG_SERVICE_URL:http://localhost:8081}

  invoice:
    queue-url: ${INVOICE_QUEUE_URL:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app: auth-service
    app.kubernetes.io/part-of: shopcloud
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        app.kubernetes.io/part-of: shopcloud
    spec:
      serviceAccountName: auth-service-sa
      containers:
        - name: auth-service
          image: __REGISTRY__/shopcloud/auth-service:__IMAGE_TAG__
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: SHOPCLOUD_JWT_EXPIRATION_MS
              value: "86400000"
          envFrom:
            - secretRef:
                name: shopcloud-app-secrets
            - configMapRef:
                name: shopcloud-runtime-config
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  labels:
    app: auth-service
    app.kubernetes.io/part-of: shopcloud
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---

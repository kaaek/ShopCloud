server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: auth-service
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/shopcloud?currentSchema=shopcloud}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

shopcloud:
  jwt:
    secret: ${SHOPCLOUD_JWT_SECRET:change-me-to-a-very-long-secret-key-32-chars-minimum}
    expiration-ms: ${SHOPCLOUD_JWT_EXPIRATION_MS:86400000}
  admin-bootstrap-key: ${SHOPCLOUD_ADMIN_BOOTSTRAP_KEY:change-me-admin-bootstrap-key}

management:
  endpoints:
    web:
      exposure:
        include: health,info

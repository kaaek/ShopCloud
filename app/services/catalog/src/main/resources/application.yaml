server:
  port: 8081

spring:
  application:
    name: catalog
  datasource:
    # Shared Postgres service/container name in docker-compose.
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:shopcloud-postgres}:${DB_PORT:5432}/${DB_NAME:shopcloud}}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      schema: ${DB_SCHEMA:shopcloud}
  jpa:
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:shopcloud}
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-frontend
  labels:
    app: customer-frontend
    app.kubernetes.io/part-of: shopcloud
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-frontend
  template:
    metadata:
      labels:
        app: customer-frontend
        app.kubernetes.io/part-of: shopcloud
    spec:
      containers:
        - name: customer-frontend
          image: __REGISTRY__/shopcloud/customer-frontend:__IMAGE_TAG__
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: customer-nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: customer-frontend.conf
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: customer-nginx-conf
          configMap:
            name: shopcloud-nginx-configs
            items:
              - key: customer-frontend.conf
                path: customer-frontend.conf

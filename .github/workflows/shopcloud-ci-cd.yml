name: ShopCloud CI/CD

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  K8S_MANIFEST: k8s/shopcloud.yaml

jobs:
  prepare:
    name: Prepare image tag
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tag.outputs.image-tag }}
    steps:
      - name: Compute short commit SHA
        id: tag
        shell: bash
        run: echo "image-tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

  backend-tests:
    name: Backend tests - ${{ matrix.service }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: shopcloud
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d shopcloud"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            path: backend/auth-service
          - service: catalog-service
            path: backend/catalog-service
          - service: cart-service
            path: backend/cart-service
          - service: checkout-service
            path: backend/checkout-service
          - service: admin-service
            path: backend/admin-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Make Maven wrapper executable
        working-directory: ${{ matrix.path }}
        run: chmod +x ./mvnw

      - name: Run Maven tests
        working-directory: ${{ matrix.path }}
        env:
          POSTGRES_URL: jdbc:postgresql://localhost:5432/shopcloud
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          SHOPCLOUD_JWT_SECRET: ci-test-secret-ci-test-secret-ci-test-secret-123456
          SHOPCLOUD_INTERNAL_TOKEN: ci-internal-token-ci-internal-token-123456
          SHOPCLOUD_ADMIN_BOOTSTRAP_KEY: ci-admin-bootstrap-key
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          INVOICE_QUEUE_URL: ''
        run: ./mvnw -B test

  frontend-tests:
    name: Frontend build test - ${{ matrix.frontend }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - frontend: customer-frontend
            path: frontend/customer-frontend
          - frontend: admin-frontend
            path: frontend/admin-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Build frontend
        working-directory: ${{ matrix.path }}
        env:
          VITE_COGNITO_REGION: us-east-1
          VITE_COGNITO_USER_POOL_ID: test
          VITE_COGNITO_CLIENT_ID: test
          VITE_COGNITO_DOMAIN: test.auth.us-east-1.amazoncognito.com
          VITE_REDIRECT_URI: http://localhost/callback
          VITE_REDIRECT_SIGN_OUT: http://localhost
        run: npm run build

  build-scan-push:
    name: Build, scan, push - ${{ matrix.image }}
    needs: [prepare, backend-tests, frontend-tests]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: auth-service
            context: backend/auth-service
          - image: catalog-service
            context: backend/catalog-service
          - image: cart-service
            context: backend/cart-service
          - image: checkout-service
            context: backend/checkout-service
          - image: admin-service
            context: backend/admin-service
          - image: customer-frontend
            context: frontend/customer-frontend
          - image: admin-frontend
            context: frontend/admin-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create customer frontend production env file
        if: matrix.image == 'customer-frontend'
        shell: bash
        run: |
          cat > frontend/customer-frontend/.env.production <<EOT
          VITE_COGNITO_USER_POOL_ID=${{ secrets.CUSTOMER_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID=${{ secrets.CUSTOMER_COGNITO_CLIENT_ID }}
          VITE_COGNITO_REGION=${{ secrets.AWS_REGION }}
          VITE_COGNITO_DOMAIN=${{ secrets.CUSTOMER_COGNITO_DOMAIN }}
          VITE_REDIRECT_URI=${{ secrets.CUSTOMER_REDIRECT_URI }}
          VITE_REDIRECT_SIGN_OUT=${{ secrets.CUSTOMER_REDIRECT_SIGN_OUT }}
          EOT

      - name: Create admin frontend production env file
        if: matrix.image == 'admin-frontend'
        shell: bash
        run: |
          cat > frontend/admin-frontend/.env.production <<EOT
          VITE_COGNITO_USER_POOL_ID=${{ secrets.ADMIN_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID=${{ secrets.ADMIN_COGNITO_CLIENT_ID }}
          VITE_COGNITO_REGION=${{ secrets.AWS_REGION }}
          VITE_COGNITO_DOMAIN=${{ secrets.ADMIN_COGNITO_DOMAIN }}
          VITE_REDIRECT_URI=${{ secrets.ADMIN_REDIRECT_URI }}
          VITE_REDIRECT_SIGN_OUT=${{ secrets.ADMIN_REDIRECT_SIGN_OUT }}
          EOT

      - name: Build Docker image
        shell: bash
        run: |
          IMAGE_URI="${ECR_REGISTRY}/shopcloud/${{ matrix.image }}:${{ needs.prepare.outputs.image-tag }}"
          docker build -t "$IMAGE_URI" "${{ matrix.context }}"

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/shopcloud/${{ matrix.image }}:${{ needs.prepare.outputs.image-tag }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Push Docker image to ECR
        shell: bash
        run: |
          IMAGE_URI="${ECR_REGISTRY}/shopcloud/${{ matrix.image }}:${{ needs.prepare.outputs.image-tag }}"
          docker push "$IMAGE_URI"

  deploy-dev:
    name: Deploy to Dev
    needs: [prepare, build-scan-push]
    if: github.ref == 'refs/heads/dev' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: dev
    env:
      K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE_DEV || 'shopcloud-dev' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name "${{ secrets.EKS_CLUSTER_NAME }}" \
            --region "${{ secrets.AWS_REGION }}"

      - name: Create namespace and runtime secrets
        shell: bash
        run: |
          kubectl create namespace "$K8S_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n "$K8S_NAMESPACE" create secret generic shopcloud-app-secrets \
            --from-literal=POSTGRES_URL="${{ secrets.POSTGRES_URL }}" \
            --from-literal=POSTGRES_USER="${{ secrets.POSTGRES_USER }}" \
            --from-literal=POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
            --from-literal=SHOPCLOUD_JWT_SECRET="${{ secrets.SHOPCLOUD_JWT_SECRET }}" \
            --from-literal=SHOPCLOUD_INTERNAL_TOKEN="${{ secrets.SHOPCLOUD_INTERNAL_TOKEN }}" \
            --from-literal=SHOPCLOUD_ADMIN_BOOTSTRAP_KEY="${{ secrets.SHOPCLOUD_ADMIN_BOOTSTRAP_KEY }}" \
            --from-literal=INVOICE_QUEUE_URL="${{ secrets.INVOICE_QUEUE_URL }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Render and apply Kubernetes manifests
        shell: bash
        run: |
          TAG="${{ needs.prepare.outputs.image-tag }}"
          sed \
            -e "s|__REGISTRY__|${ECR_REGISTRY}|g" \
            -e "s|__IMAGE_TAG__|${TAG}|g" \
            -e "s|__AWS_REGION__|${{ secrets.AWS_REGION }}|g" \
            -e "s|__ENVIRONMENT__|dev|g" \
            "$K8S_MANIFEST" > /tmp/shopcloud.yaml

          kubectl -n "$K8S_NAMESPACE" apply -f /tmp/shopcloud.yaml

      - name: Wait for rollout
        shell: bash
        run: |
          for deploy in auth-service catalog-service cart-service checkout-service admin-service customer-frontend admin-frontend; do
            kubectl -n "$K8S_NAMESPACE" rollout status deployment/$deploy --timeout=300s
          done

      - name: Diagnose rollout failure
        if: failure()
        shell: bash
        run: |
          kubectl -n "$K8S_NAMESPACE" get deploy,pods -o wide
          kubectl -n "$K8S_NAMESPACE" get events --sort-by=.lastTimestamp
          for deploy in auth-service catalog-service cart-service checkout-service admin-service customer-frontend admin-frontend; do
            kubectl -n "$K8S_NAMESPACE" describe deployment/$deploy || true
          done

      - name: Verify pods and services
        run: |
          kubectl -n "$K8S_NAMESPACE" get pods -o wide
          kubectl -n "$K8S_NAMESPACE" get svc

  deploy-prod:
    name: Deploy to Production
    needs: [prepare, build-scan-push]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: prod
    env:
      K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE_PROD || 'shopcloud-prod' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name "${{ secrets.EKS_CLUSTER_NAME }}" \
            --region "${{ secrets.AWS_REGION }}"

      - name: Create namespace and runtime secrets
        shell: bash
        run: |
          kubectl create namespace "$K8S_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n "$K8S_NAMESPACE" create secret generic shopcloud-app-secrets \
            --from-literal=POSTGRES_URL="${{ secrets.POSTGRES_URL }}" \
            --from-literal=POSTGRES_USER="${{ secrets.POSTGRES_USER }}" \
            --from-literal=POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
            --from-literal=SHOPCLOUD_JWT_SECRET="${{ secrets.SHOPCLOUD_JWT_SECRET }}" \
            --from-literal=SHOPCLOUD_INTERNAL_TOKEN="${{ secrets.SHOPCLOUD_INTERNAL_TOKEN }}" \
            --from-literal=SHOPCLOUD_ADMIN_BOOTSTRAP_KEY="${{ secrets.SHOPCLOUD_ADMIN_BOOTSTRAP_KEY }}" \
            --from-literal=INVOICE_QUEUE_URL="${{ secrets.INVOICE_QUEUE_URL }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Render and apply Kubernetes manifests
        shell: bash
        run: |
          TAG="${{ needs.prepare.outputs.image-tag }}"
          sed \
            -e "s|__REGISTRY__|${ECR_REGISTRY}|g" \
            -e "s|__IMAGE_TAG__|${TAG}|g" \
            -e "s|__AWS_REGION__|${{ secrets.AWS_REGION }}|g" \
            -e "s|__ENVIRONMENT__|prod|g" \
            "$K8S_MANIFEST" > /tmp/shopcloud.yaml

          kubectl -n "$K8S_NAMESPACE" apply -f /tmp/shopcloud.yaml

      - name: Wait for rollout
        shell: bash
        run: |
          for deploy in auth-service catalog-service cart-service checkout-service admin-service customer-frontend admin-frontend; do
            kubectl -n "$K8S_NAMESPACE" rollout status deployment/$deploy --timeout=300s
          done

      - name: Diagnose rollout failure
        if: failure()
        shell: bash
        run: |
          kubectl -n "$K8S_NAMESPACE" get deploy,pods -o wide
          kubectl -n "$K8S_NAMESPACE" get events --sort-by=.lastTimestamp
          for deploy in auth-service catalog-service cart-service checkout-service admin-service customer-frontend admin-frontend; do
            kubectl -n "$K8S_NAMESPACE" describe deployment/$deploy || true
          done

      - name: Verify pods and services
        run: |
          kubectl -n "$K8S_NAMESPACE" get pods -o wide
          kubectl -n "$K8S_NAMESPACE" get svc
